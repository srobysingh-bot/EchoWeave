name: EchoWeave
slug: echoweave
description: Alexa bridge backend for Music Assistant
url: "https://github.com/srobysingh-bot/EchoWeave"
version: "0.3.0"
auto_update: true
startup: services
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
ingress: true
ingress_port: 5000
ingress_entry: /
panel_title: EchoWeave
panel_icon: mdi:music-circle-outline
homeassistant_api: false
host_network: false
map:
  - config:rw
  - share:rw
ports:
  "5000/tcp": 5000
ports_description:
  "5000/tcp": "EchoWeave admin UI and Alexa webhook"

options:
  mode: "legacy"
  backend_url: ""
  connector_id: ""
  connector_secret: ""
  tenant_id: ""
  home_id: ""
  ma_base_url: ""
  ma_token: ""
  public_base_url: ""
  stream_base_url: ""
  ui_username: "admin"
  ui_password: ""
  aws_default_region: "us-east-1"
  locale: "en-US"
  log_level: "info"
  debug: false
  allow_insecure_local_test: false

schema:
  mode: list(legacy|connector)?
  backend_url: url?
  connector_id: str?
  connector_secret: password?
  tenant_id: str?
  home_id: str?
  ma_base_url: url?
  ma_token: password?
  public_base_url: url?
  stream_base_url: url?
  ui_username: str?
  ui_password: password?
  aws_default_region: str?
  locale: match(^[a-z]{2}-[A-Z]{2}$)?
  log_level: list(trace|debug|info|warning|error|critical)?
  debug: bool?
  allow_insecure_local_test: bool?