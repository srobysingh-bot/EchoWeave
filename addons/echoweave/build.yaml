# EchoWeave — Multi-architecture Build Configuration
# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-extended-build

build_from:
  aarch64: "ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.19"
  amd64: "ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.19"
  armhf: "ghcr.io/home-assistant/armhf-base-python:3.12-alpine3.19"
  armv7: "ghcr.io/home-assistant/armv7-base-python:3.12-alpine3.19"
  i386: "ghcr.io/home-assistant/i386-base-python:3.12-alpine3.19"

squash: false

args:
  BUILD_ARCH: "${BUILD_ARCH}"

labels:
  org.opencontainers.image.title: "EchoWeave"
  org.opencontainers.image.description: "Alexa bridge backend for Music Assistant"
  org.opencontainers.image.source: "https://github.com/srobysingh-bot/echoweave"
  org.opencontainers.image.licenses: "Apache-2.0"
