<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EchoWeave{% endblock %}</title>
    <meta name="description" content="EchoWeave — Alexa bridge for Music Assistant">
    {% set bp = base_path | default("") %}
    <link rel="stylesheet" href="{{ bp }}/static/app.css">
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">
            <span class="nav-logo">🎵</span>
            <span class="nav-title">EchoWeave</span>
        </div>
        <div class="nav-links">
            <a href="{{ bp }}/status" class="nav-link {% block nav_status %}{% endblock %}">Status</a>
            <a href="{{ bp }}/setup" class="nav-link {% block nav_setup %}{% endblock %}">Setup</a>
            <a href="{{ bp }}/config" class="nav-link {% block nav_config %}{% endblock %}">Config</a>
            <a href="{{ bp }}/logs" class="nav-link {% block nav_logs %}{% endblock %}">Logs</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>EchoWeave v{{ version | default("0.3.8") }} - Alexa bridge for Music Assistant</p>
    </footer>

    <script src="{{ bp }}/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
